<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CKD Last Seen</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:system-ui;margin:0;background:#eef1f5}
.wrap{max-width:520px;margin:auto;padding:18px}
.card{background:white;padding:20px;border-radius:14px;box-shadow:0 6px 14px rgba(0,0,0,.08)}
button.big{width:100%;padding:22px;font-size:22px;margin-bottom:16px;border:none;border-radius:12px;background:#111;color:white}
button.action{width:100%;padding:18px;font-size:20px;margin-top:16px;border:none;border-radius:12px;background:#1565C0;color:white}
button.back{background:#666}
input,select{width:100%;padding:16px;font-size:18px;margin-top:12px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box}
.msg{margin-top:14px;font-weight:bold;font-size:20px}
.resultCard{background:#f8fafc;padding:16px;border-radius:10px;margin-top:12px;border-left:6px solid #1565C0;font-size:18px}
</style>
</head>

<body>

<div class="wrap">

<div id="home" class="card">
<button class="big" onclick="showPick()">SCAN MATERIAL</button>
<button class="big" onclick="openExport()">EXPORT REPORT</button>
<button class="big" onclick="showSearch()">SEARCH PART</button>
</div>

<div id="pickCard" class="card" style="display:none">
<h3>Scan Leaving Store</h3>
<input id="picker" placeholder="Enter Your Name">
<select id="location">
<option value="STORE">STORE</option>
<option value="TABLE">TABLE</option>
<option value="REPUT">REPUT AWAY</option>
</select>
<div id="reader" style="margin-top:14px"></div>
<button class="action back" onclick="goHome()">BACK</button>
<div id="msg" class="msg"></div>
</div>

<div id="searchCard" class="card" style="display:none">
<h3>Search Last Seen</h3>
<input id="searchPart" placeholder="Enter Part ID">
<button class="action" onclick="search()">SEARCH</button>
<button class="action back" onclick="goHome()">BACK</button>
<div id="searchResult"></div>
</div>

<div id="exportCard" class="card" style="display:none">
<h3>Export Report</h3>
<select id="exportType">
<option value="today">Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
<option value="custom">Custom Range</option>
</select>

<div id="customRange" style="display:none">
<input type="date" id="fromDate">
<input type="date" id="toDate">
</div>

<button class="action" onclick="exportExcel()">DOWNLOAD</button>
<button class="action back" onclick="goHome()">BACK</button>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let scanner=null;
let scanning=false;

exportType.onchange=function(){
  customRange.style.display = this.value==="custom" ? "block":"none";
};

function showPick(){
  home.style.display="none";
  searchCard.style.display="none";
  exportCard.style.display="none";
  pickCard.style.display="block";
  startScanner();
}

function showSearch(){
  stopScanner();
  home.style.display="none";
  pickCard.style.display="none";
  exportCard.style.display="none";
  searchCard.style.display="block";
}

function openExport(){
  stopScanner();
  home.style.display="none";
  pickCard.style.display="none";
  searchCard.style.display="none";
  exportCard.style.display="block";
}

function goHome(){
  stopScanner();
  home.style.display="block";
  pickCard.style.display="none";
  searchCard.style.display="none";
  exportCard.style.display="none";
}

async function startScanner(){
  if(scanning) return;
  scanning=true;
  msgShow("Starting Camera...","black");
  scanner=new Html5Qrcode("reader");
  try{
    await scanner.start({facingMode:"environment"},{fps:10,qrbox:250},handleScan);
    msgClear();
  }catch(e){
    msgShow("Camera Failed","red");
    scanning=false;
  }
}

async function handleScan(text){
  if(!scanning) return;
  scanning=false;
  try{await scanner.stop();}catch{}
  scanner=null;

  const picker=pickerField();
  const location=document.getElementById("location").value;

  if(!picker){
    msgShow("Enter Name First","red");
    return;
  }

  const part=parsePart(text);
  msgShow("Saving...","black");

  try{
    await db.collection("picks").add({
      part:part,
      picker:picker,
      location:location,
      time:new Date()
    });
    msgShow("✔ Saved: "+part,"green");
  }catch(e){
    msgShow("Save Failed","red");
    return;
  }

  setTimeout(()=>{msgClear();startScanner();},2000);
}

function stopScanner(){
  if(scanner){
    scanner.stop().catch(()=>{});
    scanner=null;
    scanning=false;
  }
}

function pickerField(){
  return document.getElementById("picker").value.trim();
}

function parsePart(text){
  const clean=text.replace("/", "-");
  const parts=clean.split("-");
  for(let p of parts){
    if(/^[A-Z]{2,3}\d{4,6}$/.test(p)) return p;
  }
  return text;
}

function msgShow(t,c){
  msg.innerText=t;
  msg.style.color=c;
}

function msgClear(){
  msg.innerText="";
}

async function search(){
  const p=searchPart.value.trim();
  if(!p){
    searchResult.innerHTML="Enter Part";
    return;
  }
  searchResult.innerHTML="Searching...";
  try{
    const snap=await db.collection("picks")
      .where("part","==",p)
      .orderBy("time","desc")
      .limit(5)
      .get();

    if(snap.empty){
      searchResult.innerHTML="<div class='resultCard'>No record → Possible real shortage</div>";
      return;
    }

    const latest=snap.docs[0].data();
    const diffMin=Math.floor((Date.now()-latest.time.toDate().getTime())/60000);

    let html=`<div class="resultCard"><b>LAST SEEN: ${latest.location}</b><br>
    By: ${latest.picker}<br>${diffMin} minutes ago</div><div class="resultCard"><b>History</b><br>`;

    let i=1;
    snap.forEach(doc=>{
      const d=doc.data();
      html+=`${i}. ${d.location} — ${d.picker}<br>${d.time.toDate().toLocaleString()}<br><br>`;
      i++;
    });

    html+="</div>";
    searchResult.innerHTML=html;

  }catch(e){
    searchResult.innerHTML="Search Error";
  }
}

async function exportExcel(){
  msgShow("Preparing Excel...","black");

  let start,end;
  const type=exportType.value;
  const now=new Date();

  if(type==="today"){
    start=new Date(); start.setHours(0,0,0,0); end=new Date();
  }
  else if(type==="week"){
    const day=now.getDay();
    const diff=now.getDate()-day+(day===0?-6:1);
    start=new Date(now.setDate(diff)); start.setHours(0,0,0,0);
    end=new Date();
  }
  else if(type==="month"){
    start=new Date(now.getFullYear(),now.getMonth(),1);
    end=new Date();
  }
  else{
    if(!fromDate.value||!toDate.value){
      msgShow("Select date range","red");
      return;
    }
    start=new Date(fromDate.value); start.setHours(0,0,0,0);
    end=new Date(toDate.value); end.setHours(23,59,59);
  }

  try{
    const snap=await db.collection("picks")
      .where("time",">=",start)
      .where("time","<=",end)
      .orderBy("time","desc")
      .get();

    if(snap.empty){
      msgShow("No Data","red");
      return;
    }

    let data=[];
    snap.forEach(doc=>{
      const d=doc.data();
      const t=d.time.toDate();
      data.push({
        Date:t.toLocaleDateString(),
        Time:t.toLocaleTimeString(),
        PartID:d.part,
        Picker:d.picker,
        Location:d.location
      });
    });

    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"CKD Report");
    XLSX.writeFile(wb,"CKD_Report.xlsx");

    msgShow("✔ Excel Downloaded","green");

  }catch(e){
    msgShow("Export Failed","red");
  }
}

</script>
</body>
</html>
